name: Deploy demo to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Prepare static demo
        run: |
          mkdir -p dist-demo/src dist-demo/images
          cp motoparts-shop/deploy-demo/index.html dist-demo/index.html
          cp motoparts-shop/deploy-demo/src/main.js dist-demo/src/main.js
          cp motoparts-shop/deploy-demo/src/styles.css dist-demo/src/styles.css
          cp motoparts-shop/public/images/* dist-demo/images/
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist-demo

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
